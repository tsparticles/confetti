name: Lint & Format

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          npm ci
      - name: Run eslint
        run: |
          npm run lint
      - name: Check formatting
        run: |
          npm run format:check
